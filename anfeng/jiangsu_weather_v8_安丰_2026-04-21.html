    <script src="https://cdn.staticfile.org/Chart.js/3.9.1/chart.min.js"></script>
    <script>
        // 备选CDN列表
        window.chartCdnFallbacks = [
            'https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js',
            'https://lib.baomitu.com/Chart.js/3.9.1/chart.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js'
        ];
        window.chartFallbackIndex = 0;
        
        function tryLoadChartFallback() {
            if (typeof Chart !== 'undefined') return true;
            if (window.chartFallbackIndex >= window.chartCdnFallbacks.length) {
                console.error('所有CDN加载失败');
                return false;
            }
            var url = window.chartCdnFallbacks[window.chartFallbackIndex++];
            console.log('尝试备选CDN: ' + url);
            var s = document.createElement('script');
            s.src = url;
            s.onload = function() { if(typeof window.chartLoadedCallback === 'function') window.chartLoadedCallback(); };
            s.onerror = function() { tryLoadChartFallback(); };
            document.head.appendChild(s);
            return false;
        }
    </script>

                const temp = details.temperature_2m_mean ? details.temperature_2m_mean.toFixed(1) : '--';
                const tempRange = details.temperature_2m_range ? details.temperature_2m_range.toFixed(1) : '--';
                const cloud = details.cloud_cover_mean ? Math.round(details.cloud_cover_mean) : '--';
                const precip = details.precipitation_total ? details.precipitation_total.toFixed(1) : '0.0';
                const daytimeRad = details.daytime_radiation ? Math.round(details.daytime_radiation) : '--';
                
                let weatherTag = '';
                if (details.precipitation_total > 5) {
                    weatherTag = '<span style="background:#3b82f6;color:white;padding:2px 6px;border-radius:8px;font-size:10px;margin-left:6px;">🌧️ 雨</span>';
                } else if (details.cloud_cover_mean > 70) {
                    weatherTag = '<span style="background:#9ca3af;color:white;padding:2px 6px;border-radius:8px;font-size:10px;margin-left:6px;">☁️ 阴</span>';
                } else if (details.cloud_cover_mean < 30 && details.shortwave_radiation_total > 2500) {
                    weatherTag = '<span style="background:#f59e0b;color:white;padding:2px 6px;border-radius:8px;font-size:10px;margin-left:6px;">☀️ 晴</span>';
                }
                
                html += `
                    <div class="similar-day-card">

                            <span title="平均风速">💨 ${wind100m} m/s</span>
                            <span title="风速波动/最大">📈 ±${windStd} (峰${windMax})</span>
                            <span title="平均温度">🌡️ ${temp}°C</span>
                            <span title="日温差">🔄 Δ${tempRange}°C</span>
                            <span title="日降水量">🌧️ ${precip} mm</span>
                            <span title="平均云量">☁️ ${cloud}%</span>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            html += renderSimilarWeatherSection(forecastDate, similarList);
            html += renderClearingPriceSection(forecastDate);
            html += renderEnergyBlockSection(forecastDate);
            
            return html;
        }
        
        function renderSimilarWeatherSection(forecastDate, similarList) {
            if (!similarList || similarList.length === 0) return '';
            
            const hasHourly = similarList.some(item => item[2] && item[2].hourly_temperature_2m);
            if (!hasHourly) {
                return `
                    <div class="similar-weather-section">
                        <h4>📈 相似日天气曲线</h4>
                        <div style="background:white;border-radius:10px;padding:20px;text-align:center;color:#888;font-size:13px;">

                        </div>
                    </div>`;
            }
            
            if (!weatherSelections[forecastDate]) {
                weatherSelections[forecastDate] = similarList.map(item => item[0]);
            }
            
            let checkboxesHtml = '<div class="similar-weather-selector"><div class="selector-label">📊 选择要显示的相似日：</div>';
            similarList.forEach((item, index) => {
                const [histDate, similarity] = item;
                const color = CLEARING_LINE_COLORS[index % CLEARING_LINE_COLORS.length];

                    </div>`;

            checkboxesHtml += '</div>';
            
            const chartDefs = [
                { key: 'temperature_2m',       title: '🌡️ 气温 (°C)',       yLabel: '°C' },
                { key: 'shortwave_radiation',   title: '☀️ 太阳辐射 (W/m²)', yLabel: 'W/m²', yMin: 0 },
                { key: 'wind_speed_100m',       title: '💨 100m风速 (m/s)',  yLabel: 'm/s',  yMin: 0 },
                { key: 'cloud_cover',           title: '☁️ 云量 (%)',        yLabel: '%',    yMin: 0, yMax: 100 },
            ];
            
            let chartsHtml = '<div class="similar-weather-charts">';
            chartDefs.forEach(def => {
                chartsHtml += `
                    <div class="similar-weather-chart-card">

                        <div class="similar-weather-chart-wrap">
                            <canvas id="simWeather-${forecastDate}-${def.key}"></canvas>
                        </div>

            chartsHtml += '</div>';
            
            return `
                <div class="similar-weather-section">
                    <h4>📈 相似日天气曲线</h4>
                    ${checkboxesHtml}
                    ${chartsHtml}
                </div>`;
        }
        
        function toggleWeatherDay(forecastDate, histDate) {
            if (!weatherSelections[forecastDate]) weatherSelections[forecastDate] = [];
            const idx = weatherSelections[forecastDate].indexOf(histDate);
            if (idx > -1) {
                weatherSelections[forecastDate].splice(idx, 1);
            } else {
                weatherSelections[forecastDate].push(histDate);
            }
            const cb = document.querySelector(`[data-wforecast="${forecastDate}"][data-whist="${histDate}"]`);
            if (cb) cb.classList.toggle('checked', idx === -1);
            renderSimilarWeatherCharts(forecastDate);
        }
        
        const HOUR_LABELS = Array.from({length: 24}, (_, i) => String(i+1).padStart(2,'0') + ':00');
        
        function renderSimilarWeatherCharts(forecastDate) {
            const similarList = similarDaysData[forecastDate];
            if (!similarList) return;
            
            const selections = weatherSelections[forecastDate] || [];
            
            const chartDefs = [
                { key: 'temperature_2m',     yLabel: '°C',   yMin: undefined, yMax: undefined },
                { key: 'shortwave_radiation', yLabel: 'W/m²', yMin: 0,         yMax: undefined },
                { key: 'wind_speed_100m',     yLabel: 'm/s',  yMin: 0,         yMax: undefined },
                { key: 'cloud_cover',         yLabel: '%',    yMin: 0,         yMax: 100 },
            ];
            
            const forecastHourly = {};
            const forecastIndices = [];
            weatherData.time.forEach((t, i) => {
                if (t.startsWith(forecastDate)) forecastIndices.push(i);
            });
            
            chartDefs.forEach(def => {
                if (weatherData[def.key]) {
                    forecastHourly[def.key] = forecastIndices.map(i => weatherData[def.key][i] ?? null);
                }
            });
            
            chartDefs.forEach(def => {
                const canvasId = `simWeather-${forecastDate}-${def.key}`;
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                
                const chartKey = canvasId;
                if (weatherCharts[chartKey]) {
                    weatherCharts[chartKey].destroy();
                    delete weatherCharts[chartKey];
                }
                
                const datasets = [];
                if (forecastHourly[def.key] && forecastHourly[def.key].length > 0) {
                    const d = new Date(forecastDate);
                    datasets.push({
                        label: `📅 ${d.getMonth()+1}/${d.getDate()} 预报`,
                        data: forecastHourly[def.key],
                        borderColor: '#1e293b',
                        backgroundColor: 'rgba(30,41,59,0.08)',
                        borderWidth: 2.5,
                        borderDash: [6, 3],
                        fill: false,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: '#1e293b',
                        order: 0,
                    });
                }
                
                similarList.forEach((item, index) => {
                    const [histDate, similarity, details] = item;
                    if (!selections.includes(histDate)) return;
                    if (!details || !details[`hourly_${def.key}`]) return;
                    
                    const color = CLEARING_LINE_COLORS[index % CLEARING_LINE_COLORS.length];
                    const d = new Date(histDate);
                    const dateLabel = `${d.getMonth()+1}/${d.getDate()}`;
                    
                    datasets.push({
                        label: `#${index+1} ${dateLabel} (${similarity}%)`,
                        data: details[`hourly_${def.key}`],
                        borderColor: color.border,
                        backgroundColor: color.bg,
                        borderWidth: 1.5,
                        fill: false,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color.border,
                        order: index + 1,
                    });
                });
                
                if (datasets.length === 0) return;
                
                const ctx = canvas.getContext('2d');
                weatherCharts[chartKey] = new Chart(ctx, {
                    type: 'line',
                    data: { labels: HOUR_LABELS, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: { boxWidth: 10, padding: 6, font: { size: 10 } }
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                backgroundColor: 'rgba(0,0,0,0.75)',
                                titleFont: { size: 11 },
                                bodyFont: { size: 11 },
                                padding: 8,
                                callbacks: {
                                    label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) : '--'} ${def.yLabel}`
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            x: {
                                ticks: { font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
                                grid: { color: 'rgba(0,0,0,0.04)' }
                            },
                            y: {
                                title: { display: true, text: def.yLabel, font: { size: 9 } },
                                min: def.yMin,
                                max: def.yMax,
                                ticks: { font: { size: 9 } },
                                grid: { color: 'rgba(0,0,0,0.04)' }
                            }
                        }
                    }
                });
            });
        }
        
        function renderClearingPriceSection(forecastDate) {
            const priceInfo = clearingPriceData[forecastDate];
            
            if (!priceInfo || !priceInfo.similar_days) {
                return `
                    <div class="clearing-price-section">
                        <h4>💰 参考出清价格</h4>
                        <div class="no-clearing-data">
                            暂无该日相似日的出清价格数据<br>
                            <small>请确保 "实时出清数据" 文件夹中有对应日期的数据</small>
                        </div>
                    </div>
                `;
            }
            
            const similarDays = priceInfo.similar_days;
            const hasAnyData = similarDays.some(d => d.clearing_price !== null);
            if (!hasAnyData) {
                return `
                    <div class="clearing-price-section">
                        <h4>💰 参考出清价格</h4>
                        <div class="no-clearing-data">
                            相似日均无出清价格数据<br>
                            <small>请确保 "实时出清数据" 文件夹中有对应日期的数据</small>
                        </div>
                    </div>
                `;
            }
            
            if (!clearingSelections[forecastDate]) {
                clearingSelections[forecastDate] = [];
                const firstWithData = similarDays.find(d => d.clearing_price !== null);
                if (firstWithData) {
                    clearingSelections[forecastDate].push(firstWithData.date);
                }
            }
            
            let checkboxesHtml = '<div class="clearing-day-selector"><div class="selector-label">📊 选择要显示的相似日出清曲线：</div>';
            
            similarDays.forEach((dayInfo, index) => {
                const color = CLEARING_LINE_COLORS[index % CLEARING_LINE_COLORS.length];
                const hasData = dayInfo.clearing_price !== null;
                const isChecked = clearingSelections[forecastDate].includes(dayInfo.date);
                
                const d = new Date(dayInfo.date);
                const dateLabel = `${d.getMonth() + 1}/${d.getDate()}`;
                
                checkboxesHtml += `
                    <div class="clearing-day-checkbox ${isChecked ? 'checked' : ''} ${!hasData ? 'no-data' : ''}"
                         style="--line-color: ${color.border}"
                         data-forecast="${forecastDate}"
                         data-hist="${dayInfo.date}"
                         onclick="${hasData ? `toggleClearingDay('${forecastDate}', '${dayInfo.date}')` : ''}">
                        <span class="color-dot"></span>
                        <span class="rank-badge">#${dayInfo.rank}</span>
                        <span>${dateLabel}</span>
                        <span class="similarity">${dayInfo.similarity}%</span>
                    </div>
                `;
            });
            
            checkboxesHtml += '</div>';
            
            return `
                <div class="clearing-price-section">
                    <h4>💰 参考出清价格 <small style="font-weight:normal;color:#666;">(点击下方标签切换显示)</small></h4>
                    ${checkboxesHtml}
                    <div class="clearing-price-chart">
                        <canvas id="clearingChart-${forecastDate}"></canvas>
                    </div>
                    <div class="clearing-price-stats" id="clearingStats-${forecastDate}">
                        <button class="copy-price-btn" id="copyBtn-${forecastDate}"
                                onclick="copyClearingPrices('${forecastDate}')">
                            📋 一键复制价格数据
                        </button>
                    </div>
                </div>
            `;
        }
        
        function copyClearingPrices(forecastDate) {
            const priceInfo = clearingPriceData[forecastDate];
            const selections = clearingSelections[forecastDate] || [];
            if (!priceInfo || selections.length === 0) return;
            
            const columns = [];
            const headers = [];
            
            selections.forEach(selDate => {
                const dayInfo = priceInfo.similar_days.find(d => d.date === selDate);
                if (!dayInfo || !dayInfo.clearing_price) return;
                const d = new Date(selDate);
                headers.push(`#${dayInfo.rank} ${d.getMonth()+1}/${d.getDate()}(${dayInfo.similarity}%)`);
                columns.push(dayInfo.clearing_price.hourly_prices);
            });
            
            if (columns.length === 0) return;
            
            const rows = [];
            rows.push(['时间(1-24点)', ...headers].join('\t'));
            for (let hour = 0; hour < 24; hour++) {
                const hourLabel = String(hour + 1).padStart(2, '0') + ':00';
                const vals = columns.map(col => {
                    const v = col[hour];
                    return (v !== null && v !== undefined) ? v : '';
                });
                rows.push([hourLabel, ...vals].join('\t'));
            }
            
            const tsv = rows.join('\n');
            
            navigator.clipboard.writeText(tsv).then(() => {
                const btn = document.getElementById('copyBtn-' + forecastDate);
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = `✅ 已复制 (${columns.length}列×24行)`;
                    btn.classList.add('copied');
                    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2500);
                }
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = tsv;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                const btn = document.getElementById('copyBtn-' + forecastDate);
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = `✅ 已复制 (${columns.length}列×24行)`;
                    btn.classList.add('copied');
                    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2500);
                }
            });
        }
        
        // ============ 能量块市场数据 ============
        
        const EB_LINE_COLORS = [
            { border: '#0284c7', bg: 'rgba(2, 132, 199, 0.15)', name: '蓝' },

        function renderEnergyBlockSection(forecastDate) {

                    <div class="energy-block-section">

                        <div class="no-energy-block-data">
                            相似日均无能量块市场数据<br>

                    </div>
                `;

            if (!ebSelections[forecastDate]) {

                const firstWithData = similarDays.find(d => d.energy_block !== null);
                if (firstWithData) {
                    ebSelections[forecastDate].push(firstWithData.date + '|' + (firstWithData.trading_date || ''));
                }
            }
            
            let checkboxesHtml = '<div class="eb-day-selector"><div class="selector-label">📊 选择要显示的相似日能量块数据（最低价 + 加权均价）：</div>';
            
            similarDays.forEach((dayInfo, index) => {
                const color = EB_LINE_COLORS[index % EB_LINE_COLORS.length];
                const hasData = dayInfo.energy_block !== null;
                const ebKey = dayInfo.date + '|' + (dayInfo.trading_date || '');
                const isChecked = ebSelections[forecastDate].includes(ebKey);
                
                const d = new Date(dayInfo.date);
                const dateLabel = `${d.getMonth() + 1}/${d.getDate()}`;
                const tradingLabel = dayInfo.trading_date
                    ? (() => { const td = new Date(dayInfo.trading_date); return `${td.getMonth()+1}/${td.getDate()}`; })()
                    : '';
                const leadLabel = dayInfo.lead_time ? `L${dayInfo.lead_time}` : '';
                
                checkboxesHtml += `
                    <div class="eb-day-checkbox ${isChecked ? 'checked' : ''} ${!hasData ? 'no-data' : ''}"
                         style="--line-color: ${color.border}"
                         data-eb-forecast="${forecastDate}"
                         data-eb-key="${ebKey}"
                         onclick="${hasData ? `toggleEnergyBlockDay('${forecastDate}', '${ebKey}')` : ''}">
                        <span class="color-dot"></span>
                        <span class="rank-badge">#${dayInfo.rank}</span>
                        <span>${dateLabel}</span>
                        <span style="color:#666;font-size:10px;">(交易${tradingLabel} ${leadLabel})</span>
                        <span class="similarity">${dayInfo.similarity}%</span>
                    </div>
                `;
            });
            
            checkboxesHtml += '</div>';
            
            return `
                <div class="energy-block-section">
                    <h4>📦 能量块市场参考 <span class="eb-badge">预报相似日</span>
                        <small style="font-weight:normal;color:#0369a1;font-size:11px;">（实线=加权均价 虚线=最低价）</small>
                    </h4>
                    ${checkboxesHtml}
                    <div class="energy-block-chart">
                        <canvas id="ebChart-${forecastDate}"></canvas>
                    </div>
                    <div class="energy-block-stats" id="ebStats-${forecastDate}">
                        <button class="copy-eb-btn" id="copyEbBtn-${forecastDate}"
                                onclick="copyEnergyBlockPrices('${forecastDate}')">

                        </button>
                    </div>
                </div>

        }
        
        function toggleEnergyBlockDay(forecastDate, ebKey) {
            if (!ebSelections[forecastDate]) {
                ebSelections[forecastDate] = [];
            }
            
            const index = ebSelections[forecastDate].indexOf(ebKey);
            if (index > -1) {
                ebSelections[forecastDate].splice(index, 1);
            } else {
                ebSelections[forecastDate].push(ebKey);
            }
            
            const checkbox = document.querySelector(`[data-eb-forecast="${forecastDate}"][data-eb-key="${ebKey}"]`);
            if (checkbox) {
                checkbox.classList.toggle('checked', index === -1);
            }
            
            renderEnergyBlockChart(forecastDate);

        function renderEnergyBlockChart(forecastDate) {
            const ebInfo = energyBlockData[forecastDate];
            if (!ebInfo || !ebInfo.similar_days) return;
            
            const canvasId = 'ebChart-' + forecastDate;
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            if (energyBlockCharts[forecastDate]) {
                energyBlockCharts[forecastDate].destroy();
            }
            
            const selections = ebSelections[forecastDate] || [];

                const ctx = canvas.getContext('2d');

                const statsContainer = document.getElementById('ebStats-' + forecastDate);
                if (statsContainer) {
                    statsContainer.innerHTML = `

                                onclick="copyEnergyBlockPrices('${forecastDate}')">

                return;
            }
            
            const datasets = [];
            const similarDays = ebInfo.similar_days;
            let labels = [];
            let allMinPrices = [];
            let allWeightedPrices = [];
            
            selections.forEach(selectedKey => {
                const dayInfo = similarDays.find(d => (d.date + '|' + (d.trading_date || '')) === selectedKey);
                if (!dayInfo || !dayInfo.energy_block) return;
                
                const colorIndex = dayInfo.rank - 1;
                const color = EB_LINE_COLORS[colorIndex % EB_LINE_COLORS.length];
                
                if (labels.length === 0) {
                    labels = dayInfo.energy_block.hourly_times;

                const d = new Date(dayInfo.date);

                datasets.push({
                    label: `#${dayInfo.rank} ${shortLabel} 最低 (${dayInfo.similarity}%)`,
                    data: dayInfo.energy_block.min_prices,
                    borderColor: color.border,
                    backgroundColor: 'transparent',
                    borderWidth: 1.5,
                    borderDash: [6, 3],
                    fill: false,
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    pointHoverBackgroundColor: color.border,
                    order: colorIndex + 10,
                });
                
                allMinPrices.push(...dayInfo.energy_block.min_prices.filter(p => p !== null));
                allWeightedPrices.push(...dayInfo.energy_block.weighted_prices.filter(p => p !== null));
            });
            
            if (datasets.length === 0) return;
            
            const ctx = canvas.getContext('2d');
            energyBlockCharts[forecastDate] = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                boxWidth: 16,
                                padding: 8,
                                font: { size: 10 },
                                usePointStyle: false,
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { size: 11 },
                            bodyFont: { size: 11 },
                            padding: 10,
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) : '--'} 元/MWh`
                            }
                        }
                    },
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: {
                            ticks: { font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 12 },
                            grid: { color: 'rgba(0,0,0,0.04)' }
                        },
                        y: {
                            title: { display: true, text: '元/MWh', font: { size: 10 } },
                            grid: { color: 'rgba(0,0,0,0.06)' },
                            ticks: { font: { size: 9 } }
                        }
                    }
                }
            });
            
            // 更新统计
            const statsContainer = document.getElementById('ebStats-' + forecastDate);
            if (!statsContainer) return;
            
            if (allWeightedPrices.length === 0) {
                statsContainer.innerHTML = `
                    <div class="eb-stat"><span class="label">无有效数据</span></div>
                    <button class="copy-eb-btn" id="copyEbBtn-${forecastDate}" disabled
                            onclick="copyEnergyBlockPrices('${forecastDate}')">
                        📋 一键复制能量块数据
                    </button>`;
                return;
            }
            
            const avgWeighted = (allWeightedPrices.reduce((a,b) => a+b, 0) / allWeightedPrices.length).toFixed(1);
            const avgMin      = (allMinPrices.reduce((a,b) => a+b, 0) / allMinPrices.length).toFixed(1);
            const globalMin   = Math.min(...allMinPrices).toFixed(1);
            const globalMax   = Math.max(...allWeightedPrices).toFixed(1);
            const n = selections.length;
            
            statsContainer.innerHTML = `
                <div class="eb-stat">
                    <span class="label">加权均价均值</span>
                    <span class="value weighted-price">${avgWeighted} 元</span>
                </div>
                <div class="eb-stat">
                    <span class="label">最低价均值</span>
                    <span class="value min-price">${avgMin} 元</span>
                </div>
                <div class="eb-stat">
                    <span class="label">全局最低</span>
                    <span class="value min-price">${globalMin} 元</span>
                </div>
                <div class="eb-stat">
                    <span class="label">全局最高</span>
                    <span class="value weighted-price">${globalMax} 元</span>
                </div>
                <div class="eb-stat">
                    <span class="label">已选</span>
                    <span class="value">${n} 天</span>
                </div>
                <button class="copy-eb-btn" id="copyEbBtn-${forecastDate}"
                        onclick="copyEnergyBlockPrices('${forecastDate}')">
                    📋 一键复制 (${n}天 最低价+加权价)
                </button>
            `;
        }
        
        function copyEnergyBlockPrices(forecastDate) {
            const ebInfo = energyBlockData[forecastDate];
            const selections = ebSelections[forecastDate] || [];
            if (!ebInfo || selections.length === 0) return;
            
            const columns = [];
            const headers = ['时间(1-24点)'];
            
            selections.forEach(selKey => {
                const dayInfo = ebInfo.similar_days.find(d => (d.date + '|' + (d.trading_date || '')) === selKey);
                if (!dayInfo || !dayInfo.energy_block) return;
                const d = new Date(dayInfo.date);
                const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
                const tradStr = dayInfo.trading_date
                    ? (() => { const td = new Date(dayInfo.trading_date); return `${td.getMonth()+1}/${td.getDate()}`; })()
                    : '';
                const tag = `#${dayInfo.rank} ${dateStr}(${tradStr}) ${dayInfo.similarity}%`;
                headers.push(tag + ' 最低价');
                headers.push(tag + ' 加权均价');
                columns.push({ min: dayInfo.energy_block.min_prices, weighted: dayInfo.energy_block.weighted_prices });
            });
            
            if (columns.length === 0) return;
            
            const rows = [headers.join('\t')];
            for (let hour = 0; hour < 24; hour++) {
                const hourLabel = String(hour + 1).padStart(2, '0') + ':00';
                const vals = [];
                columns.forEach(col => {
                    vals.push(col.min[hour] !== null && col.min[hour] !== undefined ? col.min[hour] : '');
                    vals.push(col.weighted[hour] !== null && col.weighted[hour] !== undefined ? col.weighted[hour] : '');
                });
                rows.push([hourLabel, ...vals].join('\t'));
            }
            
            const tsv = rows.join('\n');
            
            navigator.clipboard.writeText(tsv).then(() => {
                const btn = document.getElementById('copyEbBtn-' + forecastDate);
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = `✅ 已复制 (${columns.length}天×24行)`;
                    btn.classList.add('copied');
                    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2500);
                }
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = tsv;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                const btn = document.getElementById('copyEbBtn-' + forecastDate);
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = `✅ 已复制 (${columns.length}天×24行)`;
                    btn.classList.add('copied');
                    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2500);
                }
            });
        }
        
        function formatDateShort(dateStr) {
            const d = new Date(dateStr);
            const month = d.getMonth() + 1;
            const day = d.getDate();
            
            if (dateStr === TODAY) {
                return `${month}月${day}日 (今天)`;
            }
            
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
            return `${month}月${day}日 周${dayOfWeek}`;
        }
        
        function formatTime(isoString) {
            const d = new Date(isoString);
            const hour = d.getHours() + 1;
            return `${d.getMonth()+1}/${d.getDate()} ${String(hour).padStart(2,'0')}:00`;
        }
        
        function formatHour(isoString) {
            const d = new Date(isoString);
            const hour = d.getHours() + 1;
            return `${String(hour).padStart(2,'0')}:00`;
        }
        
        function getAlignedTicks(times, isDaily) {
            const labels = [];
            const tickIndices = [];
            
            times.forEach((t, i) => {
                const d = new Date(t);
                const hour = d.getHours();
                
                if (isDaily) {
                    if (hour % 3 === 0) {
                        labels.push(formatHour(t));
                        tickIndices.push(i);
                    } else {
                        labels.push('');
                    }
                } else {
                    if (hour === 0 || hour === 12) {
                        labels.push(formatTime(t));
                        tickIndices.push(i);
                    } else {
                        labels.push('');
                    }
                }
            });
            
            return { labels, tickIndices };
        }
        
        function getXAxisConfig(isDaily) {
            return {
                ticks: {
                    maxRotation: 0,
                    autoSkip: false,
                    callback: function(value, index, ticks) {
                        const label = this.getLabelForValue(value);
                        return label || null;
                    }
                },
                grid: {
                    color: function(context) {
                        const label = context.chart.data.labels[context.index];
                        return label ? 'rgba(0,0,0,0.06)' : 'transparent';
                    }
                }
            };
        }
        
        function onTimeRangeChange() {
            selectedDate = null;
            document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('active'));
            updateAllCharts();
        }
        
        function selectDate(date) {
            selectedDate = date;
            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.date === date);
            });
            updateAllCharts();
        }
        
        function getFilteredData() {
            if (selectedDate) {
                const result = {};
                const indices = [];
                weatherData.time.forEach((t, i) => {
                    if (t.startsWith(selectedDate)) indices.push(i);
                });
                
                Object.keys(weatherData).forEach(key => {
                    result[key] = indices.map(i => weatherData[key][i]);
                });
                return result;
            } else {
                const rangeValue = document.getElementById('timeRange').value;
                
                if (rangeValue === 'all') return weatherData;
                
                if (rangeValue === 'history') {
                    const result = {};
                    const indices = [];
                    weatherData.time.forEach((t, i) => {
                        if (t.split('T')[0] < TODAY) indices.push(i);
                    });
                    Object.keys(weatherData).forEach(key => {
                        result[key] = indices.map(i => weatherData[key][i]);
                    });
                    return result;
                }
                
                if (rangeValue === 'forecast') {
                    const result = {};
                    const indices = [];
                    weatherData.time.forEach((t, i) => {
                        if (t.split('T')[0] >= TODAY) indices.push(i);
                    });
                    Object.keys(weatherData).forEach(key => {
                        result[key] = indices.map(i => weatherData[key][i]);
                    });
                    return result;
                }
                
                const hours = parseInt(rangeValue);
                const n = weatherData.time.length;
                const startIdx = Math.max(0, n - hours);
                
                const result = {};
                Object.keys(weatherData).forEach(key => {
                    result[key] = weatherData[key].slice(startIdx);
                });
                return result;
            }
        }
        
        function calcStats(arr) {
            const valid = arr.filter(v => v !== null && v !== undefined && !isNaN(v));
            if (valid.length === 0) return { avg: null, max: null, min: null };
            
            return {
                avg: valid.reduce((a, b) => a + b, 0) / valid.length,
                max: Math.max(...valid),
                min: Math.min(...valid)
            };
        }
        
        function toggleWeatherView(view) {
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            document.getElementById('briefDesc').classList.toggle('active', view === 'brief');
            document.getElementById('detailDesc').classList.toggle('active', view === 'detail');
        }
        
        function getWeatherType(cloudCover, precipitation, radiation, snowfall = 0) {
            if (snowfall > 5) return { emoji: '🌨️', type: '雪天', desc: '有降雪' };
            if (snowfall > 1) return { emoji: '❄️', type: '小雪', desc: '有小雪' };
            if (snowfall > 0.1) return { emoji: '🌨️', type: '零星小雪', desc: '零星飘雪' };
            if (precipitation > 5) return { emoji: '🌧️', type: '雨天', desc: '有降雨' };
            if (precipitation > 1) return { emoji: '🌦️', type: '小雨', desc: '有小雨' };
            if (cloudCover > 80) return { emoji: '☁️', type: '阴天', desc: '多云转阴' };
            if (cloudCover > 50) return { emoji: '⛅', type: '多云', desc: '多云' };
            if (cloudCover > 20) return { emoji: '🌤️', type: '晴间多云', desc: '晴间多云' };
            if (radiation > 400) return { emoji: '☀️', type: '晴朗', desc: '阳光充足' };
            return { emoji: '🌥️', type: '多云', desc: '天气一般' };
        }
        
        function getWindLevel(speed) {
            if (speed > 13.9) return { level: '7级以上', desc: '大风', warning: true };
            if (speed > 10.8) return { level: '6级', desc: '强风', warning: true };
            if (speed > 8.0) return { level: '5级', desc: '清劲风', warning: false };
            if (speed > 5.5) return { level: '4级', desc: '和风', warning: false };
            if (speed > 3.4) return { level: '3级', desc: '微风', warning: false };
            if (speed > 1.6) return { level: '2级', desc: '轻风', warning: false };
            return { level: '1级', desc: '软风', warning: false };
        }
        
        function generateBriefDescription(data) {
            if (!data || !data.time || data.time.length === 0) {
                return '<div class="no-weather-desc">请选择日期查看天气概况</div>';
            }
            
            const tempStats = calcStats(data.temperature_2m || []);
            const windStats = calcStats(data.wind_speed_100m || []);
            const cloudStats = calcStats(data.cloud_cover || []);
            const precipSum = (data.precipitation || []).reduce((a, b) => a + (b || 0), 0);
            const precipMax = Math.max(...(data.precipitation || []).filter(v => v !== null && v !== undefined), 0);
            const snowSum = (data.snowfall || []).reduce((a, b) => a + (b || 0), 0);
            const radStats = calcStats(data.shortwave_radiation || []);
            
            const weather = getWeatherType(cloudStats.avg || 0, precipSum, radStats.avg || 0, snowSum);
            const wind = getWindLevel(windStats.max || 0);
            
            let specialTags = [];
            
            if (snowSum > 10) specialTags.push('<span class="special-tag snow-heavy">🌨️ 大雪</span>');
            else if (snowSum > 5) specialTags.push('<span class="special-tag snow-medium">🌨️ 中雪</span>');
            else if (snowSum > 1) specialTags.push('<span class="special-tag snow-light">❄️ 小雪</span>');
            else if (snowSum > 0.1) specialTags.push('<span class="special-tag snow-trace">🌨️ 零星小雪</span>');
            else if (precipSum > 25) specialTags.push('<span class="special-tag rain-heavy">🌧️ 大雨</span>');
            else if (precipSum > 10) specialTags.push('<span class="special-tag rain-medium">🌧️ 中雨</span>');
            else if (precipSum > 2) specialTags.push('<span class="special-tag rain-light">🌦️ 小雨</span>');
            else if (precipSum > 0.5) specialTags.push('<span class="special-tag rain-trace">💧 零星小雨</span>');
            
            if (snowSum > 0.1 && precipSum > snowSum * 2) {
                specialTags = specialTags.filter(t => !t.includes('snow-') && !t.includes('rain-'));
                specialTags.push('<span class="special-tag sleet">🌨️ 雨夹雪</span>');
            }
            
            if (windStats.max > 17.2) specialTags.push('<span class="special-tag wind-severe">🌪️ 8级大风</span>');
            else if (windStats.max > 13.9) specialTags.push('<span class="special-tag wind-strong">💨 7级强风</span>');
            else if (windStats.max > 10.8) specialTags.push('<span class="special-tag wind-medium">💨 6级风</span>');
            
            if (tempStats.min !== null && tempStats.min < 0) specialTags.push('<span class="special-tag cold">❄️ 有冰冻</span>');
            else if (tempStats.min !== null && tempStats.min < 3) specialTags.push('<span class="special-tag cold-light">🥶 低温</span>');
            
            if (tempStats.max !== null && tempStats.max > 35) specialTags.push('<span class="special-tag hot">🔥 高温</span>');
            if (cloudStats.avg > 80 && precipSum < 1 && snowSum < 0.5) specialTags.push('<span class="special-tag cloudy">☁️ 阴天</span>');
            
            let desc = `<span class="weather-emoji">${weather.emoji}</span>`;
            
            if (selectedDate) {
                desc += `<strong>${formatDateShort(selectedDate)}</strong>`;
            } else {
                const rangeSelect = document.getElementById('timeRange');
                desc += `<strong>${rangeSelect.options[rangeSelect.selectedIndex].text}</strong>`;
            }
            
            if (specialTags.length > 0) desc += ' ' + specialTags.join(' ');
            desc += '。';
            desc += `天气以<span class="highlight">${weather.type}</span>为主`;
            
            if (tempStats.max !== null) {
                desc += `，气温<span class="temp-low">${tempStats.min.toFixed(1)}°C</span>~<span class="temp-high">${tempStats.max.toFixed(1)}°C</span>`;
            }
            desc += '。';
            
            if (windStats.max !== null) {
                desc += `100m风速<span class="wind-strong">${windStats.min.toFixed(1)}~${windStats.max.toFixed(1)}m/s</span>（${wind.level}）。`;
            }
            
            if (radStats.avg !== null) {
                const radTotal = Math.round((data.shortwave_radiation || []).reduce((a, b) => a + (b || 0), 0));
                if (radTotal > 0) {
                    if (radTotal >= 4000) desc += `日辐照总量<span class="highlight">${radTotal} Wh/m²</span>（峰值${Math.round(radStats.max)} W/m²，辐照充足）。`;
                    else if (radTotal >= 1500) desc += `日辐照总量<span class="highlight">${radTotal} Wh/m²</span>（峰值${Math.round(radStats.max)} W/m²，辐照一般）。`;
                    else desc += `日辐照总量<span class="highlight">${radTotal} Wh/m²</span>（辐照偏低）。`;
                } else {
                    desc += `全天辐照接近零，光伏无出力。`;
                }
            }
            
            if (snowSum > 0.1) {
                desc += `累计降雪<span class="snow">${snowSum.toFixed(1)}cm</span>`;
                if (snowSum > 1) desc += `，最大时降雪${(data.snowfall || []).reduce((a,b)=>Math.max(a,b||0),0).toFixed(1)}cm`;
                desc += '。';
            } else if (precipSum > 0.5) {
                desc += `累计降水<span class="rain">${precipSum.toFixed(1)}mm</span>`;
                if (precipMax > 5) desc += `，最大时降水${precipMax.toFixed(1)}mm`;
                desc += '。';
            }
            
            let impacts = [];
            if (selectedDate) {
                if (radStats.avg !== null) {
                    if (snowSum > 2 || precipSum > 5 || cloudStats.avg > 80) impacts.push('☁️ 光伏出力受限');
                    else if (radStats.max > 600 && cloudStats.avg < 40) impacts.push('☀️ 光伏出力良好');
                    else if (cloudStats.avg > 50) impacts.push('⛅ 光伏出力一般');
                }
                if (windStats.avg !== null) {
                    if (windStats.max > 25) impacts.push('⚠️ 风机可能限电');
                    else if (windStats.avg > 8) impacts.push('💨 风电出力优秀');
                    else if (windStats.avg > 5) impacts.push('💨 风电出力良好');
                    else if (windStats.avg < 3) impacts.push('🍃 风电出力有限');
                }
            }
            
            if (impacts.length > 0) desc += '<br><span class="impact-line">' + impacts.join(' | ') + '</span>';
            
            return desc;
        }
        
        function getDataByPeriod(data) {
            if (!data || !data.time || data.time.length === 0) return null;
            
            const periods = {
                night:   { name: '凌晨',   icon: '🌙', hours: [0,1,2,3,4,5],            time: '01:00-06:00', data: {} },
                morning: { name: '早晨',   icon: '🌅', hours: [6,7,8,9],                time: '07:00-10:00', data: {} },
                daytime: { name: '光伏段', icon: '☀️', hours: [10,11,12,13,14,15],      time: '11:00-16:00', data: {} },
                evening: { name: '夜间',   icon: '🌆', hours: [16,17,18,19,20,21,22,23],time: '17:00-24:00', data: {} }
            };
            
            Object.keys(periods).forEach(p => {
                periods[p].data = {
                    temperature_2m: [], wind_speed_100m: [], cloud_cover: [],
                    precipitation: [], snowfall: [], shortwave_radiation: [], relative_humidity_2m: []
                };
            });
            
            data.time.forEach((t, i) => {
                const hour = new Date(t).getHours();
                Object.keys(periods).forEach(p => {
                    if (periods[p].hours.includes(hour)) {
                        Object.keys(periods[p].data).forEach(key => {
                            if (data[key] && data[key][i] !== null && data[key][i] !== undefined) {
                                periods[p].data[key].push(data[key][i]);
                            }
                        });
                    }
                });
            });
            
            return periods;
        }
        
        function generatePeriodDescription(periodData, periodName) {
            const temp = calcStats(periodData.temperature_2m);
            const wind = calcStats(periodData.wind_speed_100m);
            const cloud = calcStats(periodData.cloud_cover);
            const precip = periodData.precipitation.reduce((a, b) => a + (b || 0), 0);
            const precipMax = periodData.precipitation.length > 0 ? Math.max(...periodData.precipitation.filter(v => v !== null && v !== undefined)) : 0;
            const snow = (periodData.snowfall || []).reduce((a, b) => a + (b || 0), 0);
            const radiation = calcStats(periodData.shortwave_radiation);
            
            let desc = '';
            let alerts = [];
            
            const weather = getWeatherType(cloud.avg || 0, precip, radiation.avg || 0, snow);
            desc += `${weather.desc}`;
            
            if (snow > 3) alerts.push('<span class="alert snow">🌨️ 较强降雪</span>');
            else if (snow > 0.5) alerts.push('<span class="alert snow">❄️ 有降雪</span>');
            else if (precip > 10) alerts.push('<span class="alert rain">🌧️ 较强降水</span>');
            else if (precip > 3) alerts.push('<span class="alert rain">🌦️ 有降水</span>');
            
            if (wind.max > 13.9) alerts.push('<span class="alert wind">💨 强风</span>');
            if (temp.min !== null && temp.min < 0) alerts.push('<span class="alert cold">❄️ 冰冻</span>');
            
            if (alerts.length > 0) desc += ' ' + alerts.join(' ');
            
            if (temp.avg !== null) {
                desc += `，<span class="metric temp">🌡️ ${temp.avg.toFixed(1)}°C`;
                if (temp.max !== temp.min && temp.max !== null) desc += ` (${temp.min.toFixed(0)}~${temp.max.toFixed(0)}°C)`;
                desc += `</span>`;
            }
            
            if (wind.avg !== null) {
                const windLevel = getWindLevel(wind.max || wind.avg);
                desc += `<span class="metric wind">💨 ${wind.avg.toFixed(1)}m/s ${windLevel.level}</span>`;
            }
            
            if (cloud.avg !== null) desc += `<span class="metric cloud">☁️ ${Math.round(cloud.avg)}%</span>`;
            
            if (periodName === 'daytime' && radiation.avg !== null) {
                desc += `<span class="metric sun">☀️ ${Math.round(radiation.avg)}W/m²</span>`;
            }
            
            if (snow > 0.1) desc += `<span class="metric snow">🌨️ ${snow.toFixed(1)}cm</span>`;
            else if (precip > 0.1) desc += `<span class="metric rain">🌧️ ${precip.toFixed(1)}mm</span>`;
            
            let impact = '';
            if (periodName === 'daytime') {
                if (snow > 1 || precip > 5 || cloud.avg > 80) impact = '⚡ 光伏出力受限';
                else if (radiation.avg > 500 && cloud.avg < 40) impact = '⚡ 光伏出力良好';
            }
            if ((periodName === 'night' || periodName === 'evening') && wind.avg !== null) {
                if (wind.max > 25) impact = '⚡ 风机可能限电';
                else if (wind.avg > 8) impact = '⚡ 风电出力优秀';
                else if (wind.avg > 5) impact = '⚡ 风电出力良好';
            }
            
            if (impact) desc += `<br>${impact}`;
            
            return desc;
        }
        
        function generateDetailDescription(data) {
            if (!data || !data.time || data.time.length === 0) {
                return '<div class="no-weather-desc">请选择具体日期查看分时段天气分析</div>';
            }
            
            const periods = getDataByPeriod(data);
            if (!periods) return '<div class="no-weather-desc">数据不足，无法生成分时段分析</div>';
            
            const periodOrder = ['night', 'morning', 'daytime', 'evening'];
            
            let html = '';
            periodOrder.forEach(p => {
                const period = periods[p];
                const hasData = Object.values(period.data).some(arr => arr.length > 0);
                
                if (hasData) {
                    const desc = generatePeriodDescription(period.data, p);
                    html += `
                        <div class="period-card ${p}">
                            <div class="period-header">
                                <span class="period-icon">${period.icon}</span>
                                <span class="period-name">${period.name}</span>
                                <span class="period-time">${period.time}</span>
                            </div>
                            <div class="period-desc">${desc}</div>
                        </div>
                    `;
                }
            });
            
            return html || '<div class="no-weather-desc">数据不足，无法生成分时段分析</div>';
        }
        
        function updateWeatherDescription(data) {
            const briefText = document.getElementById('briefText');
            const periodGrid = document.getElementById('periodGrid');
            if (briefText) briefText.innerHTML = generateBriefDescription(data);
            if (periodGrid) periodGrid.innerHTML = generateDetailDescription(data);
        }
        
        function updateStats(data) {
            const periodLabel = document.getElementById('statsPeriod');
            
            if (selectedDate) {
                periodLabel.textContent = formatDateShort(selectedDate);
                periodLabel.className = 'period' + (selectedDate < TODAY ? ' history' : '');
            } else {
                const range = document.getElementById('timeRange');
                periodLabel.textContent = range.options[range.selectedIndex].text;
                periodLabel.className = 'period' + (range.value === 'history' ? ' history' : '');
            }
            
            const statsConfig = [
                { key: 'temperature_2m',        icon: '🌡️', label: '气温',     unit: '°C',   color: '#ef4444', decimals: 1 },
                { key: 'apparent_temperature',  icon: '🌡️', label: '体感温度', unit: '°C',   color: '#f97316', decimals: 1 },
                { key: 'shortwave_radiation',   icon: '☀️', label: '太阳辐射', unit: 'W/m²', color: '#eab308', decimals: 0 },
                { key: 'wind_speed_100m',       icon: '💨', label: '100m风速', unit: 'm/s',  color: '#22c55e', decimals: 1 },
                { key: 'cloud_cover',           icon: '☁️', label: '云量',     unit: '%',    color: '#6b7280', decimals: 0 },
                { key: 'relative_humidity_2m',  icon: '💧', label: '湿度',     unit: '%',    color: '#3b82f6', decimals: 0 },
            ];
            
            const html = statsConfig.map(cfg => {
                const stats = calcStats(data[cfg.key] || []);
                const avgStr = stats.avg !== null ? stats.avg.toFixed(cfg.decimals) : '--';
                const maxStr = stats.max !== null ? stats.max.toFixed(cfg.decimals) : '--';
                const minStr = stats.min !== null ? stats.min.toFixed(cfg.decimals) : '--';
                
                return `
                    <div class="stat-card" style="--accent: ${cfg.color}">
                        <div class="header-row">
                            <div>
                                <div class="label">${cfg.label}</div>
                                <div class="main-value">${avgStr}<span class="unit">${cfg.unit}</span></div>
                            </div>
                            <div class="icon">${cfg.icon}</div>
                        </div>
                        <div class="sub-values">
                            <span class="max">↑ ${maxStr}</span>
                            <span class="min">↓ ${minStr}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('statsRow').innerHTML = html;
        }
        
        function createChart(canvasId, config) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            charts[canvasId] = new Chart(ctx, config);
        }
        
        function getTooltipConfig(data) {
            return {
                enabled: true,
                mode: 'index',
                intersect: false,
                backgroundColor: 'rgba(255, 255, 255, 0.95)',
                titleColor: '#333',
                bodyColor: '#666',
                borderColor: '#e5e7eb',
                borderWidth: 1,
                padding: 12,
                cornerRadius: 8,
                titleFont: { weight: 'bold', size: 13 },
                bodyFont: { size: 12 },
                callbacks: {
                    title: function(context) {
                        const index = context[0].dataIndex;
                        const timeStr = data.time[index];
                        if (timeStr) {
                            const d = new Date(timeStr);
                            const month = d.getMonth() + 1;
                            const day = d.getDate();
                            const hour = String(d.getHours() + 1).padStart(2, '0');
                            const dayOfWeek = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
                            return `${month}月${day}日 ${dayOfWeek} ${hour}:00`;
                        }
                        return context[0].label;
                    },
                    label: function(context) {
                        const label = context.dataset.label || '';
                        const value = context.parsed.y;
                        if (value !== null && value !== undefined) {
                            return `  ${label}: ${value.toFixed(1)}`;
                        }
                        return null;
                    }
                }
            };
        }
        
        function getInteractionConfig() {
            return { mode: 'index', intersect: false };
        }
        
        function updateAllCharts() {
            const data = getFilteredData();
            const isDaily = !!selectedDate;
            const { labels } = getAlignedTicks(data.time, isDaily);
            const xAxisConfig = getXAxisConfig(isDaily);
            const tooltipConfig = getTooltipConfig(data);
            const interactionConfig = getInteractionConfig();
            
            updateStats(data);
            updateWeatherDescription(data);
            
            createChart('tempChart', {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '气温',
                            data: data.temperature_2m,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#ef4444',
                        },
                        {
                            label: '体感温度',
                            data: data.apparent_temperature,
                            borderColor: '#f97316',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#f97316',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 12, padding: 15 } },
                        tooltip: tooltipConfig
                    },
                    scales: {
                        x: xAxisConfig,
                        y: { title: { display: true, text: '°C' }, grid: { color: 'rgba(0,0,0,0.05)' } }
                    },
                    interaction: interactionConfig
                }
            });
            
            createChart('radiationChart', {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '总辐射 GHI',
                            data: data.shortwave_radiation,
                            borderColor: '#eab308',
                            backgroundColor: 'rgba(234, 179, 8, 0.2)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#eab308',
                        },
                        {
                            label: '直接辐射',
                            data: data.direct_radiation,
                            borderColor: '#f59e0b',
                            borderWidth: 1.5,
                            fill: false,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#f59e0b',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 12, padding: 10 } },
                        tooltip: tooltipConfig
                    },
                    scales: {
                        x: xAxisConfig,
                        y: { title: { display: true, text: 'W/m²' }, min: 0, grid: { color: 'rgba(0,0,0,0.05)' } }
                    },
                    interaction: interactionConfig
                }
            });
            
            createChart('windChart', {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '100m风速',
                            data: data.wind_speed_100m,
                            borderColor: '#14b8a6',
                            backgroundColor: 'rgba(20, 184, 166, 0.15)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#14b8a6',
                        },
                        {
                            label: '10m风速',
                            data: data.wind_speed_10m,
                            borderColor: '#22c55e',
                            borderWidth: 1.5,
                            fill: false,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#22c55e',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 12, padding: 10 } },
                        tooltip: tooltipConfig
                    },
                    scales: {
                        x: xAxisConfig,
                        y: { title: { display: true, text: 'm/s' }, min: 0, grid: { color: 'rgba(0,0,0,0.05)' } }
                    },
                    interaction: interactionConfig
                }
            });
            
            createChart('cloudHumidChart', {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '云量',
                            data: data.cloud_cover,
                            borderColor: '#6b7280',
                            backgroundColor: 'rgba(107, 114, 128, 0.15)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#6b7280',
                        },
                        {
                            label: '湿度',
                            data: data.relative_humidity_2m,
                            borderColor: '#3b82f6',
                            borderWidth: 1.5,
                            fill: false,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#3b82f6',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 12, padding: 10 } },
                        tooltip: tooltipConfig
                    },
                    scales: {
                        x: xAxisConfig,
                        y: { title: { display: true, text: '%' }, min: 0, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } }
                    },
                    interaction: interactionConfig
                }
            });
            
            createChart('precipChart', {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '降水',
                            data: data.precipitation,
                            backgroundColor: 'rgba(99, 102, 241, 0.6)',
                            borderColor: '#6366f1',
                            borderWidth: 1,
                            borderRadius: 2,
                            hoverBackgroundColor: 'rgba(99, 102, 241, 0.9)',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: tooltipConfig
                    },
                    scales: {
                        x: xAxisConfig,
                        y: { title: { display: true, text: 'mm' }, min: 0, grid: { color: 'rgba(0,0,0,0.05)' } }
                    },
                    interaction: interactionConfig
                }
            });
        }
        
        (function() {
            var resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    Object.values(charts).forEach(function(chart) { if (chart) chart.resize(); });
                    Object.values(clearingCharts).forEach(function(chart) { if (chart) chart.resize(); });
                    Object.values(weatherCharts).forEach(function(chart) { if (chart) chart.resize(); });
                    Object.values(energyBlockCharts).forEach(function(chart) { if (chart) chart.resize(); });
                }, 150);
            });
        })();

        function waitForChartAndInit() {
            if (typeof Chart !== 'undefined') {
                init();
            } else {
                console.log('等待Chart.js加载...');
                window.chartLoadedCallback = init;
                if (!tryLoadChartFallback()) {
                    setTimeout(function() {
                        if (typeof Chart === 'undefined') {
                            document.body.innerHTML = '<div style="padding:50px;text-align:center;"><h2>⚠️ 图表库加载失败</h2><p>请检查网络连接后刷新页面</p><button onclick="location.reload()" style="padding:10px 20px;margin-top:20px;cursor:pointer;">刷新页面</button></div>';
                        }
                    }, 10000);
                }
            }
        }
        waitForChartAndInit();
    </script>
</body>
</html>
